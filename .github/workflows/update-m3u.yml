name: Update YouTube Direct M3U

on:
  schedule:
    # 每2小时运行一次（与附件后台间隔一致）
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-m3u:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download remote youtubeworld.m3u
        run: |
          curl -L -o youtubeworld.m3u \
            "https://raw.githubusercontent.com/zzq1234567890/epg/refs/heads/main/youtubeworld.m3u"

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      # 可选安装 ffmpeg（获取直链一般不需要，但保留以应对特殊情况）
      - name: Install ffmpeg (optional)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 关键步骤：使用增强参数解析直播，并输出详细错误
      - name: Generate you.m3u by parsing YouTube live streams
        run: |
          INPUT="youtubeworld.m3u"
          OUTPUT="you.m3u"
          
          echo "#EXTM3U" > "$OUTPUT"
          current_extinf=""
          success=0
          fail=0
          
          # 增强的 yt-dlp 参数：模拟真实浏览器，使用安卓客户端规避限制
          YT_DLP_OPTS="--user-agent \"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36\" --add-header \"Accept-Language: en-US,en;q=0.9\" --extractor-args \"youtube:player_client=android\" --no-playlist"
          
          while IFS= read -r line || [[ -n "$line" ]]; do
            # 去除首尾空白字符
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            
            if [[ "$line" =~ ^#EXTINF: ]]; then
              # 保存当前 EXTINF 行
              current_extinf="$line"
            elif [[ -n "$line" ]] && [[ ! "$line" =~ ^# ]]; then
              # 这是一个 URL 行
              url="$line"
              # 只有前面有 EXTINF 时才处理
              if [[ -n "$current_extinf" ]]; then
                # 检查是否为 YouTube 链接
                if [[ "$url" =~ (youtube\.com|youtu\.be) ]]; then
                  echo "处理 YouTube URL: $url"
                  # 使用增强参数获取直链，并将错误输出到临时文件
                  direct_url=$(yt-dlp -g $YT_DLP_OPTS "$url" 2>yt_error.log | head -n 1)
                  if [[ -n "$direct_url" ]] && [[ "$direct_url" =~ ^https?:// ]]; then
                    echo "  成功获取: $direct_url"
                    echo "$current_extinf" >> "$OUTPUT"
                    echo "$direct_url" >> "$OUTPUT"
                    ((success++))
                  else
                    echo "  获取直链失败。错误信息："
                    cat yt_error.log
                    ((fail++))
                  fi
                else
                  # 非 YouTube 链接，原样保留
                  echo "$current_extinf" >> "$OUTPUT"
                  echo "$url" >> "$OUTPUT"
                fi
                current_extinf=""  # 重置，避免重复使用
              else
                echo "忽略无 EXTINF 的 URL: $url"
              fi
            else
              # 其他 # 开头的行忽略
              :
            fi
          done < "$INPUT"
          
          echo "处理完成。成功获取直链: $success，失败: $fail"
          echo "输出文件: $OUTPUT"

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add you.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update you.m3u"
          git push
